name: Flutter CI/CD

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

```
env:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  ANDROID_HOME: ${{ runner.temp }}/android-sdk
  ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  # -------------------------
  # Setup Java
  # -------------------------
  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  # -------------------------
  # Setup Flutter
  # -------------------------
  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: 'stable'
      cache: true

  # -------------------------
  # Install Android SDK
  # -------------------------
  - name: Install Android SDK
    run: |
      mkdir -p $ANDROID_HOME/cmdline-tools
      cd $ANDROID_HOME/cmdline-tools
      curl -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
      unzip tools.zip -d latest

      yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
        "platform-tools" \
        "platforms;android-33" \
        "build-tools;33.0.2"

  # -------------------------
  # Verify Dependencies
  # -------------------------
  - name: Verify Environment
    run: |
      java -version
      flutter --version
      flutter doctor -v

  # -------------------------
  # Cache Flutter Dependencies
  # -------------------------
  - name: Cache Pub Dependencies
    uses: actions/cache@v4
    with:
      path: |
        ~/.pub-cache
      key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}

  # -------------------------
  # Build Flutter APK
  # -------------------------
  - name: Build APK
    working-directory: register_system/backend/flutter_app
    run: |
      flutter clean
      flutter pub get
      flutter pub outdated || true
      flutter analyze
      flutter build apk --release

  # -------------------------
  # Verify Build Output
  # -------------------------
  - name: Check APK Exists
    run: |
      ls -lah register_system/backend/flutter_app/build/app/outputs/flutter-apk/

  # -------------------------
  # Upload Artifact
  # -------------------------
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: flutter-apk
      path: register_system/backend/flutter_app/build/app/outputs/flutter-apk/*.apk
```
