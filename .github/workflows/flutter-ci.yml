name: Flutter CI/CD

on:
push:
branches: ["main"]
pull_request:
branches: ["main"]

jobs:
build:
runs-on: ubuntu-latest

```
env:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  # Setup Java
  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  # Setup Flutter
  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: stable
      cache: true

  # Verify Environment
  - name: Verify Environment
    run: |
      java -version
      flutter --version
      flutter doctor -v

  # Cache dependencies
  - name: Cache Pub
    uses: actions/cache@v4
    with:
      path: ~/.pub-cache
      key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

  # Build APK
  - name: Build APK
    working-directory: register_system/backend/flutter_app
    run: |
      flutter clean
      flutter pub get
      flutter analyze
      flutter build apk --release

  # Check output
  - name: Check APK
    run: ls -lah register_system/backend/flutter_app/build/app/outputs/flutter-apk/

  # Upload artifact
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: flutter-apk
      path: register_system/backend/flutter_app/build/app/outputs/flutter-apk/*.apk
```
